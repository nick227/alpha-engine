# ═══════════════════════════════════════════════════════════════════════
# DUMP ADAPTERS  (priority 1 — run before all API sources)
# These read pre-downloaded parquet files and never make network calls.
# Download data once with: python scripts/download_stooq_dump.py, etc.
# ═══════════════════════════════════════════════════════════════════════

- id: stooq_dump
  type: market
  adapter: stooq_dump
  # Disabled until data/raw_dumps/stooq has {SYMBOL}.parquet (adapter does not read CSV).
  enabled: false
  priority: 1
  poll: null
  weight: 1.0
  backfill_days: 365
  symbols: ["AAPL", "MSFT", "SPY", "NVDA", "TSLA", "AMZN", "META", "AMD", "QQQ", "IWM"]
  options:
    dump_dir: "data/raw_dumps/stooq"
  extract:
    text: "symbol"
    timestamp: "date"
    ticker: "symbol"
    numeric_features:
      open: "open"
      high: "high"
      low: "low"
      close: "close"
      volume: "volume"

- id: fnspid_dump
  type: news
  adapter: fnspid_dump
  enabled: true
  priority: 1
  poll: null
  weight: 0.9
  backfill_days: 365
  symbols: ["AAPL", "MSFT", "SPY", "NVDA", "TSLA", "AMZN", "META", "AMD", "QQQ", "IWM"]
  options:
    dump_dir: "data/raw_dumps/fnspid"
  extract:
    text: "headline"
    timestamp: "date"
    ticker: "ticker"

- id: fred_dump
  type: macro
  adapter: fred_dump
  enabled: true
  priority: 1
  poll: null
  weight: 0.8
  backfill_days: 365
  options:
    dump_dir: "data/raw_dumps/fred"
    series: ["FEDFUNDS", "T10Y2Y", "UNRATE", "CPIAUCSL"]
  extract:
    timestamp: "date"
    numeric_features:
      macro_value: "value"

- id: csv_price_dump
  type: market
  adapter: csv_price_dump
  enabled: true
  priority: 1
  poll: null
  weight: 1.0
  backfill_days: 365
  symbols: ["AAPL", "MSFT", "SPY", "NVDA", "TSLA", "AMZN", "META", "AMD", "QQQ", "IWM"]
  options:
    dump_dir: "data/raw_dumps/full_history"
  extract:
    timestamp: "timestamp"
    ticker: "ticker"
    numeric_features:
      price_open: "price_open"
      price_high: "price_high"
      price_low: "price_low"
      price_close: "price_close"
      price_adj_close: "price_adj_close"
      volume: "volume"

# Canonical historical analyst/news dumps: raw_*.csv only (not analyst_ratings_processed.csv).
- id: analyst_ratings_dump
  type: news
  adapter: analyst_ratings_dump
  enabled: true
  priority: 1
  poll: null
  weight: 0.9
  backfill_days: 365
  symbols: ["AAPL", "MSFT", "SPY", "NVDA", "TSLA", "AMZN", "META", "AMD", "QQQ", "IWM"]
  options:
    headlines_file: "data/raw_dumps/raw_partner_headlines.csv"
    ratings_file: "data/raw_dumps/raw_analyst_ratings.csv"
  extract:
    text: "text"
    timestamp: "timestamp"
    ticker: "ticker"

- id: alpha_vantage_dump
  type: market
  adapter: alpha_vantage_dump
  enabled: true
  priority: 1
  poll: null
  weight: 1.0
  backfill_days: 100
  symbols: ["AAPL", "MSFT", "SPY", "NVDA", "TSLA", "AMZN", "META", "AMD", "QQQ", "IWM"]
  options:
    dump_dir: "data/raw_dumps/alpha_vantage"
  extract:
    timestamp: "timestamp"
    ticker: "ticker"
    numeric_features:
      price_open: "price_open"
      price_high: "price_high"
      price_low: "price_low"
      price_close: "price_close"
      volume: "volume"

- id: tiingo_dump
  type: market
  adapter: tiingo_dump
  enabled: true
  priority: 1
  poll: null
  weight: 1.0
  backfill_days: 730
  symbols: ["AAPL", "MSFT", "SPY", "NVDA", "TSLA", "AMZN", "META", "AMD", "QQQ", "IWM", "GOOGL", "META", "BRK-B", "JPM", "V", "UNH", "HD", "PG", "MA", "DIS", "PYPL", "BAC", "XOM", "PFE", "CSCO", "INTC", "VZ", "T", "MRK", "ABT", "KO", "WMT", "PEP", "CVX", "ABBV", "ACN", "NKE", "ADBE", "CRM", "NFLX", "TXN", "AMD", "QCOM", "AVGO", "ORCL", "IBM", "NOW", "INTU", "AMAT", "BKNG", "ISRG"]
  options:
    dump_dir: "data/raw_dumps/tiingo"
  extract:
    timestamp: "timestamp"
    ticker: "ticker"
    numeric_features:
      price_open: "price_open"
      price_high: "price_high"
      price_low: "price_low"
      price_close: "price_close"
      price_adj_close: "price_adj_close"
      volume: "volume"

# ═══════════════════════════════════════════════════════════════════════
# API ADAPTERS  (priority 2+ — only queried for recent data, last 3 days)
# Historical backfill is handled by the dump adapters above.
# ═══════════════════════════════════════════════════════════════════════

- id: alpaca_news_main
  type: news
  adapter: alpaca_news
  enabled: true
  priority: 80
  poll: "60s"
  weight: 1.0
  backfill_days: 90
  symbols: ["NVDA", "AAPL", "AMD"]
  extract:
    text: "headline + summary"
    timestamp: "created_at"
    ticker: "symbols"

- id: yahoo_market_watch
  type: market
  adapter: yahoo_finance
  enabled: true
  priority: 90
  poll: "120s"
  weight: 0.7
  backfill_days: 90
  symbols: ["SPY", "QQQ"]
  extract:
    text: "headline"
    timestamp: "published_at"
    ticker: "symbol"

- id: fred_rates
  type: macro
  adapter: fred_macro
  enabled: true
  priority: 20
  poll: "1h"
  weight: 0.6
  backfill_days: 90
  options:
    series: "FEDFUNDS"
  extract:
    timestamp: "date"
    numeric_features:
      fed_funds_rate: "value"

- id: reddit_wsb
  type: social
  adapter: reddit_social
  enabled: true
  priority: 70
  poll: "120s"
  weight: 0.3
  backfill_days: 90
  options:
    subreddit: "wallstreetbets"
  extract:
    text: "title + body"
    timestamp: "created_utc"
    ticker: "detected"

- id: google_trends_main
  type: crowd
  adapter: google_trends
  enabled: true
  priority: 60
  poll: "1h"
  weight: 0.5
  backfill_days: 90
  options:
    keywords: ["bitcoin", "recession", "bull market"]
  extract:
    text: "keyword + ' interest: ' + str(value)"
    numeric_features:
      google_trends_value: "value"
    timestamp: "timestamp"

- id: etf_flows_market
  type: market_structure
  adapter: etf_flows
  enabled: true
  priority: 40
  poll: "1d"
  weight: 0.8
  backfill_days: 90
  symbols: ["SPY", "QQQ", "IWM"]
  extract:
    text: "symbol + ' inflow: ' + str(inflow)"
    timestamp: "timestamp"
    ticker: "symbol"

- id: earnings_tracker
  type: volatility_event
  adapter: earnings_calendar
  enabled: true
  priority: 50
  poll: "1d"
  weight: 0.9
  backfill_days: 90
  extract:
    text: "'Earnings report scheduled for ' + symbol"
    timestamp: "date"
    ticker: "symbol"

- id: options_sentiment
  type: positioning
  adapter: options_flow
  enabled: true
  priority: 45
  poll: "15m"
  weight: 0.7
  backfill_days: 90
  symbols: ["SPY", "TSLA", "NVDA"]
  extract:
    text: "symbol + ' ' + call_put + ' premium: ' + str(premium)"
    timestamp: "timestamp"
    ticker: "symbol"

- id: yield_curve_spread
  type: regime
  adapter: fred_macro
  enabled: true
  priority: 20
  poll: "1d"
  weight: 1.0
  backfill_days: 90
  extract:
    text: "'Yield curve ' + regime"
    timestamp: "date"
    numeric_features:
      yield_spread: "value"

- id: fear_greed_index
  type: sentiment_index
  adapter: fear_greed
  enabled: true
  priority: 30
  poll: "1h"
  weight: 0.8
  backfill_days: 90
  extract:
    text: "classification"
    timestamp: "timestamp"
    numeric_features:
      fear_greed_score: "fear_greed"
      fear_greed_extreme: "extreme"
      fear_greed_delta: "delta"

- id: cross_asset_core
  type: intermarket_regime
  adapter: cross_asset
  enabled: true
  priority: 35
  poll: "15m"
  weight: 1.0
  backfill_days: 90
  extract:
    text: "symbol + ': ' + str(close)"
    timestamp: "timestamp"
    numeric_features:
      price: "close"
      volume: "volume"
      high: "high"
      low: "low"
      open: "open"

- id: market_breadth
  type: regime
  adapter: market_breadth
  enabled: true
  priority: 30
  poll: "1h"
  weight: 0.9
  backfill_days: 90
  extract:
    text: "symbol + ': ' + str(close)"
    timestamp: "timestamp"
    numeric_features:
      sample_close: "close"
      sample_volume: "volume"
      sample_high: "high"
      sample_low: "low"

- id: market_baseline
  type: momentum
  adapter: market_baseline
  enabled: true
  priority: 30
  poll: "15m"
  weight: 1.0
  backfill_days: 90
  extract:
    text: "symbol + ': ' + str(close)"
    timestamp: "timestamp"
    numeric_features:
      spy_close: "close"
      spy_volume: "volume"
      spy_high: "high"
      spy_low: "low"
      spy_open: "open"

- id: developer_bundle_ai_supply
  type: bundle
  adapter: custom_bundle
  enabled: true
  priority: 10
  poll:
  weight: 0.8
  fetch:
    kind: local_file
    file: "bundles/ai_supply.json"
  options:
    file: "bundles/ai_supply.json"
  extract:
    text: "text"
    timestamp: "timestamp"
    ticker: "ticker"
