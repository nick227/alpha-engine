- id: alpaca_news_main
  type: news
  adapter: alpaca_news
  enabled: true
  priority: 80
  poll: "60s"
  weight: 1.0
  backfill_days: 90
  symbols: ["NVDA", "AAPL", "AMD"]
  extract:
    text: "headline + summary"
    timestamp: "created_at"
    ticker: "symbols"

- id: yahoo_market_watch
  type: market
  adapter: yahoo_finance
  enabled: true
  priority: 90
  poll: "120s"
  weight: 0.7
  backfill_days: 90
  symbols: ["SPY", "QQQ"]
  extract:
    text: "headline"
    timestamp: "published_at"
    ticker: "symbol"

- id: fred_rates
  type: macro
  adapter: fred_macro
  enabled: true
  priority: 20
  poll: "1h"
  weight: 0.6
  backfill_days: 90
  options:
    series: "FEDFUNDS"
  extract:
    timestamp: "date"

- id: reddit_wsb
  type: social
  adapter: reddit_social
  enabled: true
  priority: 70
  poll: "120s"
  weight: 0.3
  backfill_days: 90
  options:
    subreddit: "wallstreetbets"
  extract:
    text: "title + body"
    timestamp: "created_utc"
    ticker: "detected"

- id: google_trends_main
  type: crowd
  adapter: google_trends
  enabled: true
  priority: 60
  poll: "1h"
  weight: 0.5
  backfill_days: 90
  options:
    keywords: ["bitcoin", "recession", "bull market"]
  extract:
    text: "keyword + ' interest: ' + str(value)"
    timestamp: "timestamp"

- id: etf_flows_market
  type: market_structure
  adapter: etf_flows
  enabled: true
  priority: 40
  poll: "1d"
  weight: 0.8
  backfill_days: 90
  symbols: ["SPY", "QQQ", "IWM"]
  extract:
    text: "symbol + ' inflow: ' + str(inflow)"
    timestamp: "timestamp"
    ticker: "symbol"

- id: earnings_tracker
  type: volatility_event
  adapter: earnings_calendar
  enabled: true
  priority: 50
  poll: "1d"
  weight: 0.9
  backfill_days: 90
  extract:
    text: "'Earnings report scheduled for ' + symbol"
    timestamp: "date"
    ticker: "symbol"

- id: options_sentiment
  type: positioning
  adapter: options_flow
  enabled: true
  priority: 45
  poll: "15m"
  weight: 0.7
  backfill_days: 90
  symbols: ["SPY", "TSLA", "NVDA"]
  extract:
    text: "symbol + ' ' + call_put + ' premium: ' + str(premium)"
    timestamp: "timestamp"
    ticker: "symbol"

- id: yield_curve_spread
  type: regime
  adapter: fred_macro
  enabled: true
  priority: 20
  poll: "1d"
  weight: 1.0
  backfill_days: 90
  extract:
    text: "'Yield curve ' + regime + ' (spread: ' + str(spread) + ')'"
    timestamp: "timestamp"

- id: fear_greed_index
  type: sentiment_index
  adapter: fear_greed
  enabled: true
  priority: 30
  poll: "1h"
  weight: 0.8
  backfill_days: 90
  extract:
    text: "classification"
    timestamp: "timestamp"
    numeric_features:
      fear_greed_score: "fear_greed"
      fear_greed_extreme: "extreme"
      fear_greed_delta: "delta"

- id: cross_asset_core
  type: intermarket_regime
  adapter: cross_asset
  enabled: true
  priority: 35
  poll: "15m"
  weight: 1.0
  backfill_days: 90
  extract:
    text: "'Oil: ' + str(oil_return_1h) + ' | VIX: ' + str(vix_level) + ' (' + vol_regime + ')'"
    timestamp: "timestamp"
    numeric_features:
      oil_return_1h: "oil_return_1h"
      gold_return_1h: "gold_return_1h"
      dxy_return_1h: "dxy_return_1h"
      yield_delta_1h: "yield_delta_1h"
      vix_level: "vix"
      vix_delta_1h: "vix_delta_1h"
      vix_zscore: "vix_zscore"

- id: market_breadth
  type: regime
  adapter: market_breadth
  enabled: true
  priority: 30
  poll: "1h"
  weight: 0.9
  backfill_days: 90
  extract:
    text: "risk_on_score"
    timestamp: "timestamp"
    numeric_features:
      breadth_ratio: "breadth_ratio"
      participation: "participation"
      risk_on_score: "risk_on_score"

- id: market_baseline
  type: momentum
  adapter: market_baseline
  enabled: true
  priority: 30
  poll: "15m"
  weight: 1.0
  backfill_days: 90
  extract:
    text: "'SPY: ' + str(spy_return_1h)"
    timestamp: "timestamp"
    numeric_features:
      spy_return_1h: "spy_return_1h"
      qqq_return_1h: "qqq_return_1h"
      iwm_return_1h: "iwm_return_1h"
      spy_return_1d: "spy_return_1d"

- id: developer_bundle_ai_supply
  type: bundle
  adapter: custom_bundle
  enabled: true
  priority: 10
  poll:
  weight: 0.8
  fetch:
    kind: local_file
    file: "bundles/ai_supply.json"
  options:
    file: "bundles/ai_supply.json"
  extract:
    text: "text"
    timestamp: "timestamp"
    ticker: "ticker"
